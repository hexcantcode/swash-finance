<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#E3E7EE" />
    <script>
      // Apply the persisted theme before first paint to avoid a flash, and sync
      // the status-bar tint (theme-color) to the chosen page floor.
      try {
        var dark = localStorage.getItem('swash-theme') === 'dark';
        if (dark) document.documentElement.dataset.theme = 'dark';
        var tc = document.querySelector('meta[name="theme-color"]');
        if (tc) tc.setAttribute('content', dark ? '#0C0C12' : '#E3E7EE');
      } catch (e) {}
    </script>
    <script>
      // This app registers NO service worker. Stale SWs from prior projects
      // on this origin (esp. localhost:5173) intercept fetches and serve
      // broken assets — blank pages, dead hydration. The /sw.js tombstone
      // only heals workers registered at that exact path, so proactively
      // unregister every SW and drop their caches on boot.
      try {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (rs) {
            rs.forEach(function (r) {
              r.unregister();
            });
          });
        }
        if (window.caches && caches.keys) {
          caches.keys().then(function (keys) {
            keys.forEach(function (k) {
              caches.delete(k);
            });
          });
        }
      } catch (e) {}
    </script>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="any" href="/favicon.png?v=6" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png?v=6" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png?v=6" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png?v=6" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
